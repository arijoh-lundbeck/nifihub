# yaml-language-server: $schema=../schema.json
# Declarative environment configuration — example for NiFi Hub
account:
  name: example
  github_environment: example

deployments:
  - name: MY_DEPLOYMENT
    deployment_type: SNOWFLAKE
    display_name: "My NiFi Hub Deployment"
    comment: "Example deployment for NiFi Hub"
    runtimes:
      - name: MY_RUNTIME
        database: OPENFLOW
        schema: OPENFLOW
        node_type: SMALL
        min_nodes: 1
        max_nodes: 1
        suspend: false
        execute_as_role: OPENFLOW_RUNTIME_ROLE
        display_name: "My Runtime"
        comment: "Example runtime"
        sensitive_param_pattern: ".*PASSWORD.*|.*SECRET.*|.*_PWD|.*TOKEN|.*_KEY"
        network_rules:
          - name: GITHUB_API
            type: HOST_PORT
            mode: EGRESS
            values:
              - "api.github.com:443"
          - name: SALESFORCE_API
            type: HOST_PORT
            mode: EGRESS
            values:
              - "your-instance.develop.my.salesforce.com:443"
          - name: SHAREPOINT_API
            type: HOST_PORT
            mode: EGRESS
            values:
              - "graph.microsoft.com:80"
              - "graph.microsoft.com:443"
              - "login.microsoftonline.com"
              - "eastus1-mediap.svc.ms"
              - "your-tenant.sharepoint.com:443"
          - name: SLACK_API
            type: HOST_PORT
            mode: EGRESS
            values:
              - "slack.com"
              - "api.slack.com"
              - "hooks.slack.com"
              - "files.slack.com"
              - "wss-primary.slack.com"
              - "wss-backup.slack.com"
        flow_registries:
          - name: nifihub
            type: org.apache.nifi.github.GitHubFlowRegistryClient
            properties:
              Repository Owner: Snowflake-Labs
              Repository Name: nifihub
              Authentication Type: PERSONAL_ACCESS_TOKEN
              Personal Access Token: ${{ secrets.NIFIHUB_REGISTRY_PAT }}
              Default Branch: main
              Repository Path: flows
        flows:
          - name: "Hello World 1"
            registry: nifihub
            bucket: examples
            flow: hello-world
            version: latest
            start: false
          - name: "Salesforce Bulk API"
            registry: ConnectorFlowRegistryClient
            bucket: connectors
            flow: salesforce-bulk-api
            version: latest
            start: true
            provided_parameter_contexts: ".*SALESFORCE"
            parameters:
              # --- Ingestion ---
              Run Schedule: "60 minutes"
              Filter: "Account, Contact, Opportunity, Lead"
              Incremental Offload: "true"
              Initial Load Chunking: "NONE"
              Column Removal Strategy: "Drop Column"
              Removed Column Name Suffix: "__deleted"
              Suspend Warehouse: "true"
              Enable Views Creation: "false"
              Enable Journal Tables: "false"
              Special Objects Filter: ~
              Object Fields Filter JSON: ~
              # --- Destination (Snowflake) ---
              Snowflake Authentication Strategy: "SNOWFLAKE_MANAGED"
              Snowflake Warehouse: "MY_WAREHOUSE"
              Snowflake Role: "OPENFLOW_RUNTIME_ROLE"
              Destination Database: "MY_DATABASE"
              Destination Schema: "SALESFORCE"
              Object Identifier Resolution: "CASE_INSENSITIVE"
              # --- Source (Salesforce) ---
              Salesforce Instance: "#{SALESFORCE_INSTANCE}" # coming from Snowflake Secrets Parameter Provider
              OAuth2 Token Endpoint URL: "#{SALESFORCE_TOKEN_ENDPOINT_URL}" # coming from Snowflake Secrets Parameter Provider
              OAuth2 Client ID: "#{SALESFORCE_OAUTH2_CLIENT_ID}" # coming from Snowflake Secrets Parameter Provider
              OAuth2 Subject: "#{SALESFORCE_OAUTH2_SUBJECT}" # coming from Snowflake Secrets Parameter Provider
              OAuth2 Audience: "#{SALESFORCE_OAUTH2_AUDIENCE}" # coming from Snowflake Secrets Parameter Provider
              Connected App Key: "#{SALESFORCE_CONNECTED_APP_KEY}" # coming from Snowflake Secrets Parameter Provider
          - name: "SharePoint Cortex Connect"
            registry: ConnectorFlowRegistryClient
            bucket: connectors
            flow: unstructured-sharepoint-cdc
            version: latest
            start: true
            provided_parameter_contexts: ".*SHAREPOINT"
            parameters:
              # --- SharePoint Source ---
              Sharepoint Tenant ID: "#{SHAREPOINT_TENANT_ID}" # coming from Snowflake Secrets Parameter Provider
              Sharepoint Client ID: "#{SHAREPOINT_CLIENT_ID}" # coming from Snowflake Secrets Parameter Provider
              Sharepoint Client Secret: "#{SHAREPOINT_CLIENT_SECRET}" # coming from Snowflake Secrets Parameter Provider
              Sharepoint Application Private Key: "#{SHAREPOINT_PRIVATE_KEY}" # coming from Snowflake Secrets Parameter Provider
              Sharepoint Application Certificate: "#{SHAREPOINT_CERT}" # coming from Snowflake Secrets Parameter Provider
              Sharepoint Site URL: "#{SHAREPOINT_SITE_URL}" # coming from Snowflake Secrets Parameter Provider
              Sharepoint Site Domain: "#{SHAREPOINT_DOMAIN}" # coming from Snowflake Secrets Parameter Provider
              Sharepoint Document Library Name: "my-document-library"
              Sharepoint Source Folder: "/"
              Sharepoint Site Groups Enabled: "false"
              # --- Snowflake Destination ---
              Snowflake Authentication Strategy: "SNOWFLAKE_MANAGED"
              Snowflake Warehouse: "MY_WAREHOUSE"
              Snowflake Role: "OPENFLOW_RUNTIME_ROLE"
              Destination Database: "MY_DATABASE"
              Destination Schema: "SHAREPOINT"
              # --- Cortex Search / Ingestion ---
              Cortex Search Service: "SHAREPOINT_SEARCH"
              Snowflake Cortex Search Service User Role: "OPENFLOW_RUNTIME_ROLE"
              Snowflake File Hash Table Name: "FILE_HASHES"
              File Extensions To Ingest: "pdf,docx,xlsx,pptx,doc,xls,ppt,html,txt"
              OCR Mode: "OCR"
              Use Legacy Removal Pattern: "false"
          - name: "Slack Cortex Connect"
            registry: ConnectorFlowRegistryClient
            bucket: connectors
            flow: unstructured-slack-cdc
            version: latest
            start: true
            provided_parameter_contexts: ".*SLACK"
            parameters:
              # --- Slack Source ---
              App Token: "#{SLACK_APP_TOKEN}" # coming from Snowflake Secrets Parameter Provider
              Bot Token: "#{SLACK_BOT_TOKEN}" # coming from Snowflake Secrets Parameter Provider
              Historical Messages Included Channel Names Regex: ".*"
              Resolve Usernames: "true"
              Refresh Slack Members: "15 minutes"
              Enable File Ingestion: "true"
              Upload Interval: "60 seconds"
              # --- Snowflake Destination ---
              Snowflake Authentication Strategy: "SNOWFLAKE_MANAGED"
              Snowflake Warehouse: "MY_WAREHOUSE"
              Snowflake Role: "OPENFLOW_RUNTIME_ROLE"
              Destination Database: "MY_DATABASE"
              Destination Schema: "SLACK"
              # --- Cortex Search / Ingestion ---
              Cortex Search Name: "SLACK_CORTEX"
              Snowflake Cortex Embedding Model: "snowflake-arctic-embed-m-v1.5"
              Snowflake File Hash Table Name: "FILE_HASHES"
              OCR Mode: "OCR"
      - name: MY_POSTGRES_RUNTIME
        database: OPENFLOW
        schema: OPENFLOW
        node_type: MEDIUM
        min_nodes: 1
        max_nodes: 1
        suspend: false
        execute_as_role: OPENFLOW_RUNTIME_ROLE
        display_name: "My Postgres Runtime"
        comment: "Example runtime for Postgres CDC"
        sensitive_param_pattern: ".*PASSWORD.*|.*SECRET.*|.*_PWD"
        network_rules:
          - name: GITHUB_API
            type: HOST_PORT
            mode: EGRESS
            values:
              - "api.github.com:443"
          - name: POSTGRES
            type: HOST_PORT
            mode: EGRESS
            values:
              - "your-postgres-service-id.your-account.region.aws.postgres.snowflake.app:5432"
        flow_registries:
          - name: nifihub
            type: org.apache.nifi.github.GitHubFlowRegistryClient
            properties:
              Repository Owner: Snowflake-Labs
              Repository Name: nifihub
              Authentication Type: PERSONAL_ACCESS_TOKEN
              Personal Access Token: ${{ secrets.NIFIHUB_REGISTRY_PAT }}
              Default Branch: main
              Repository Path: flows
        parameter_providers:
          - name: SnowflakeSecrets
            type: com.snowflake.openflow.runtime.parameter.snowflake.SnowflakeParameterProvider
            sensitive_param_pattern: ".*"
            properties:
              Snowflake Connection Service: SnowflakeConnection
        controller_services:
          - name: SnowflakeConnection
            type: com.snowflake.openflow.runtime.services.snowflake.SnowflakeConnectionService
            properties:
              Authentication Strategy: SNOWFLAKE_MANAGED
        flows:
          - name: "CDC Postgres Demo - Data Generator"
            registry: nifihub
            bucket: data-generator
            flow: postgres-cdc-demo
            version: latest
            start: true
            assets:
              - name: "postgresql-42.7.10.jar"
                url: "https://jdbc.postgresql.org/download/postgresql-42.7.10.jar"
                parameter: "Database Driver"
            provided_parameter_contexts: ".*POSTGRES"
            parameters:
              Database Connection URL: "#{POSTGRES_URL}" # coming from Snowflake Secrets Parameter Provider
              Database Name: "mydb"
              Database User: "my_user"
              Database Password: "#{POSTGRES_PWD}" # coming from Snowflake Secrets Parameter Provider
              Schema Name: "my_schema"
        connectors:
          - name: MY_POSTGRES_CONNECTOR
            definition: OPENFLOW_POSTGRES_CDC
            display_name: "My Postgres CDC Connector"
            comment: "CDC from Postgres to Snowflake"
            start: true
            assets:
              - name: "postgresql-42.7.10.jar"
                url: "https://jdbc.postgresql.org/download/postgresql-42.7.10.jar"
                parameter: "Source Database Driver"
            parameters:
              Source Database Publication Name: "my_publication"
              Source Database Connection URL: "jdbc:postgresql://your-postgres-service-id.your-account.region.aws.postgres.snowflake.app:5432/mydb?sslmode=require"
              Source Database User: "my_user"
              Source Database Password: "MY_DATABASE.MY_SCHEMA.POSTGRES_PWD"
              Included Comma Separated Source Table Names: "my_schema.table1,my_schema.table2"
              Snowflake Destination Database: "MY_DATABASE"
              Snowflake Warehouse: "MY_WAREHOUSE"
              Table Storage Format: "STANDARD"
              Object Identifier Resolution: "CASE_INSENSITIVE"
