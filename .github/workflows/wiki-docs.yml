name: Update Wiki Documentation

on:
  push:
    branches: [main]
    paths:
      - 'extensions/**'
      - 'scripts/generate-wiki-docs.py'
      - 'wiki/**'

  workflow_dispatch:

concurrency:
  group: wiki-docs
  cancel-in-progress: true

permissions:
  contents: write

env:
  MAVEN_OPTS: >-
    -Xmx4g
    -Dorg.slf4j.simpleLogger.defaultLogLevel=WARN

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    name: Generate and Publish Wiki Docs
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'maven'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build All Bundles
        run: |
          BUILT=0
          for pom in $(find extensions -name "pom.xml" -path "*-bundle/pom.xml"); do
            echo "Building: $pom"
            ./mvnw clean package \
              -DskipTests \
              -f "$pom" \
              --no-snapshot-updates \
              --no-transfer-progress \
              --batch-mode || echo "Warning: Build failed for $pom"
            BUILT=$((BUILT + 1))
          done
          echo "Built $BUILT bundle(s)"

      - name: Generate Wiki Markdown
        run: python scripts/generate-wiki-docs.py --extensions-dir extensions --output-dir wiki-output

      - name: Clone Wiki Repository
        run: |
          git clone "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.wiki.git" wiki-repo 2>/dev/null || {
            echo "Wiki not yet initialized. Creating initial wiki page..."
            mkdir -p wiki-repo
            cd wiki-repo
            git init
            git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.wiki.git"
          }

      - name: Update Wiki Content
        run: |
          cp wiki-output/*.md wiki-repo/
          if [ -d wiki ]; then
            cp wiki/*.md wiki-repo/
          fi

          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --staged --quiet; then
            echo "No documentation changes detected. Skipping wiki update."
          else
            COMPONENT_COUNT=$(ls ../wiki-output/*.md | wc -l)
            git commit -m "Update wiki documentation ($((COMPONENT_COUNT - 1)) components)"
            git push origin HEAD:master
            echo "Wiki updated"
          fi
