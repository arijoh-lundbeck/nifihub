name: Release Bundle

on:
  workflow_dispatch:
    inputs:
      bundle_path:
        description: 'Path to the bundle (e.g., extensions/examples/getting-started/nifi-example-bundle)'
        required: true
        type: string
      release_version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      next_dev_version:
        description: 'Next development version (e.g., 1.1.0-SNAPSHOT)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  MAVEN_OPTS: >-
    -Xmx4g
    -Dorg.slf4j.simpleLogger.defaultLogLevel=WARN

jobs:
  release:
    runs-on: ubuntu-latest
    name: Release ${{ inputs.bundle_path }} v${{ inputs.release_version }}
    steps:
      - name: Validate Inputs
        run: |
          if [ ! -f "${{ inputs.bundle_path }}/pom.xml" ]; then
            echo "::error::Bundle POM not found at ${{ inputs.bundle_path }}/pom.xml"
            exit 1
          fi

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'maven'

      - name: Set Release Version
        run: >
          ./mvnw versions:set-property
          -Dproperty=revision
          -DnewVersion=${{ inputs.release_version }}
          -DgenerateBackupPoms=false
          -f ${{ inputs.bundle_path }}/pom.xml

      - name: Build and Verify
        run: >
          ./mvnw clean verify
          -Pcontrib-check
          -f ${{ inputs.bundle_path }}/pom.xml
          --show-version
          --no-snapshot-updates
          --no-transfer-progress

      - name: Extract Artifact ID
        id: artifact
        run: |
          ARTIFACT_ID=$(./mvnw help:evaluate -Dexpression=project.artifactId -q -DforceStdout -f ${{ inputs.bundle_path }}/pom.xml)
          echo "artifact_id=$ARTIFACT_ID" >> $GITHUB_OUTPUT

      - name: Find NAR File
        id: nar
        run: |
          NAR_FILE=$(find ${{ inputs.bundle_path }} -name "*.nar" -path "*/target/*" | head -1)
          if [ -n "$NAR_FILE" ]; then
            echo "nar_file=$NAR_FILE" >> $GITHUB_OUTPUT
            echo "has_nar=true" >> $GITHUB_OUTPUT
          else
            echo "has_nar=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release ${{ steps.artifact.outputs.artifact_id }}-${{ inputs.release_version }}"
          git tag "${{ steps.artifact.outputs.artifact_id }}-${{ inputs.release_version }}"
          git push origin "${{ steps.artifact.outputs.artifact_id }}-${{ inputs.release_version }}"

      - name: Generate Release Notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_ID="${{ steps.artifact.outputs.artifact_id }}"
          BUNDLE_PATH="${{ inputs.bundle_path }}"
          TAG_NAME="${ARTIFACT_ID}-${{ inputs.release_version }}"
          REPO="${{ github.repository }}"
          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"

          PREV_TAG=$(git tag --list "${ARTIFACT_ID}-*" --sort=-version:refname | grep -v "^${TAG_NAME}$" | head -1)

          echo "## What's Changed" > "$NOTES_FILE"
          echo "" >> "$NOTES_FILE"

          if [ -n "$PREV_TAG" ]; then
            LOG_RANGE="${PREV_TAG}..${TAG_NAME}"
          else
            LOG_RANGE=""
          fi

          git log $LOG_RANGE --format="%s" -- "$BUNDLE_PATH" | while IFS= read -r subject; do
            PR_NUM=$(echo "$subject" | grep -oP '\(#\K[0-9]+(?=\))' || true)
            if [ -n "$PR_NUM" ]; then
              PR_JSON=$(gh pr view "$PR_NUM" --json title,author,number --jq '{title: .title, author: .author.login, number: .number}' 2>/dev/null || true)
              if [ -n "$PR_JSON" ]; then
                PR_TITLE=$(echo "$PR_JSON" | jq -r .title)
                PR_AUTHOR=$(echo "$PR_JSON" | jq -r .author)
                echo "* ${PR_TITLE} by @${PR_AUTHOR} in [#${PR_NUM}](https://github.com/${REPO}/pull/${PR_NUM})" >> "$NOTES_FILE"
              else
                echo "* ${subject}" >> "$NOTES_FILE"
              fi
            else
              echo "* ${subject}" >> "$NOTES_FILE"
            fi
          done

          if ! grep -q '^\*' "$NOTES_FILE"; then
            echo "* Initial release" >> "$NOTES_FILE"
          fi

          if [ -n "$PREV_TAG" ]; then
            echo "" >> "$NOTES_FILE"
            echo "**Full diff**: [\`${PREV_TAG}...${TAG_NAME}\`](https://github.com/${REPO}/compare/${PREV_TAG}...${TAG_NAME})" >> "$NOTES_FILE"
          fi

          echo "notes_file=$NOTES_FILE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ARGS=(
            "${{ steps.artifact.outputs.artifact_id }}-${{ inputs.release_version }}"
            --title "${{ steps.artifact.outputs.artifact_id }} ${{ inputs.release_version }}"
            --notes-file "${{ steps.notes.outputs.notes_file }}"
          )
          if [ "${{ steps.nar.outputs.has_nar }}" = "true" ]; then
            RELEASE_ARGS+=("${{ steps.nar.outputs.nar_file }}")
          fi
          gh release create "${RELEASE_ARGS[@]}"

      - name: Set Next Development Version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_ID="${{ steps.artifact.outputs.artifact_id }}"
          NEXT_VERSION="${{ inputs.next_dev_version }}"
          BRANCH="auto-release/${ARTIFACT_ID}-${NEXT_VERSION}"
          git checkout -b "$BRANCH"

          ./mvnw versions:set-property \
            -Dproperty=revision \
            -DnewVersion="${NEXT_VERSION}" \
            -DgenerateBackupPoms=false \
            -f ${{ inputs.bundle_path }}/pom.xml

          git add -A
          git commit -m "[auto-release] Prepare ${ARTIFACT_ID} ${NEXT_VERSION} for next development iteration"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "[auto-release] Prepare ${ARTIFACT_ID} ${NEXT_VERSION}" \
            --body "Automated version bump after release of **${ARTIFACT_ID}** ${{ inputs.release_version }}. Prepares the next development iteration." \
            --label "infra"
