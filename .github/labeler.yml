extensions:
  - changed-files:
      - any-glob-to-any-file: 'extensions/**'

flows:
  - changed-files:
      - any-glob-to-any-file: 'flows/**'

infra:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'
          - 'pom.xml'
          - 'checkstyle.xml'
          - 'pmd-ruleset.xml'
          - 'codecov.yml'
          - '.editorconfig'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.md'
          - 'AGENTS.md'
          - 'CONTRIBUTING.md'
          - 'README.md'
